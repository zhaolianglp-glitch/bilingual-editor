<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilingual Editor</title>
<style>:root {
  color-scheme: light dark;
  --bg: light-dark(#ffffff, #1e1e1e);
  --bg2: light-dark(#f5f5f5, #2a2a2a);
  --bg3: light-dark(#e8e8e8, #333333);
  --text: light-dark(#1a1a1a, #d4d4d4);
  --text2: light-dark(#666666, #888888);
  --border: light-dark(#d0d0d0, #3c3c3c);
  --hl-bg: light-dark(#e8f0fe, #1a2a3a);
  --hl-border: light-dark(#4a90d9, #3b8fc2);
  --tb-bg: light-dark(#f8f8f8, #252526);
  --ph-bg: light-dark(#f0f0f0, #2d2d2d);
  --modal-bg: light-dark(#ffffff, #252526);
  --inp-bg: light-dark(#fafafa, #1e1e1e);
  --btn-bg: light-dark(#eeeeee, #333333);
  --btn-border: light-dark(#cccccc, #555555);
  --btn-hover: light-dark(#dddddd, #444444);
  --primary: light-dark(#1a73e8, #0e639c);
  --primary-hover: light-dark(#1557b0, #1177bb);
  --accent: light-dark(#7c3aed, #5a3e8a);
  --accent-hover: light-dark(#6d28d9, #6b4ea0);
  --st: light-dark(#f0f0f0, #1e1e1e);
  --sth: light-dark(#c0c0c0, #424242);
  --toast-bg: light-dark(#333333, #444444);
  --toast-text: light-dark(#ffffff, #eeeeee);
  --prog-bg: light-dark(#f0f0f0, #333333);
  --callout-bg: light-dark(#eef2ff, #1e1b4b);
  --callout-border: light-dark(#6366f1, #818cf8);
  --callout-note-text: light-dark(#3730a3, #c7d2fe);
  --callout-body-text: light-dark(#4b5563, #a5b4fc);
  --callout-shadow: light-dark(rgba(99,102,241,0.10), rgba(99,102,241,0.18));
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Roboto, sans-serif;
  background: var(--bg); color: var(--text); height: 100vh;
  display: flex; flex-direction: column; overflow: hidden;
}
#toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px; background: var(--tb-bg);
  border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
}
#toolbar .sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
#toolbar button {
  padding: 6px 14px; border: 1px solid var(--btn-border); background: var(--btn-bg);
  color: var(--text); border-radius: 4px; cursor: pointer; font-size: 13px;
  transition: all 0.15s; white-space: nowrap;
}
#toolbar button:hover { background: var(--btn-hover); }
#toolbar button.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
#toolbar button.primary:hover { background: var(--primary-hover); }
#toolbar button.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
#toolbar button.accent:hover { background: var(--accent-hover); }
#toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }
#toolbar .status {
  font-size: 12px; color: var(--text2); margin-left: auto;
  display: flex; align-items: center; gap: 8px;
}
#toolbar .spinner {
  display: none; width: 14px; height: 14px;
  border: 2px solid var(--border); border-top-color: var(--primary);
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
#toolbar .spinner.show { display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
#main { display: flex; flex: 1; overflow: hidden; }
.panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.panel-header {
  padding: 6px 16px; font-size: 12px; font-weight: 600; color: var(--text2);
  background: var(--ph-bg); border-bottom: 1px solid var(--border);
  text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
}
.panel-header .lang-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  background: var(--bg3); color: var(--text2);
}
#divider {
  width: 4px; background: var(--border); cursor: col-resize; flex-shrink: 0;
  transition: background 0.15s;
}
#divider:hover, #divider.dragging { background: var(--primary); }
.editor {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  line-height: 1.7; font-size: 14px; outline: none;
  font-family: "Cascadia Code", "Fira Code", Consolas, "Noto Sans Mono", monospace;
  white-space: pre-wrap;
}
#editor-left {
  font-family: Cambria, Georgia, "Times New Roman", serif;
  font-size: 16px;
  line-height: 1.75;
}
.editor .para {
  margin-bottom: 0; padding: 2px 10px;
  border-left: 3px solid transparent;
  border-radius: 0 4px 4px 0;
  min-height: 1.6em; outline: none; cursor: text;
  transition: background 0.15s, border-color 0.2s, box-shadow 0.2s;
  position: relative;
}
.editor .para:hover { background: var(--bg2); }
.editor .para.highlight {
  border-left-color: var(--hl-border);
  background: var(--hl-bg);
  box-shadow: inset 0 0 0 1px rgba(74,144,217,0.12);
}
.editor .para.callout-line {
  background: var(--callout-bg);
  border-left: 4px solid var(--callout-border);
  padding: 6px 14px;
  box-shadow: inset 0 0 0 1px var(--callout-shadow);
  border-radius: 0;
  transition: background 0.15s, box-shadow 0.2s;
}
.editor .para.callout-note {
  font-weight: 600;
  color: var(--callout-note-text);
  padding-top: 10px;
  padding-bottom: 8px;
  letter-spacing: 0.1px;
}
.editor .para.callout-note::before {
  content: "💬";
  margin-right: 6px;
  font-weight: 400;
  font-size: 0.95em;
  filter: saturate(1.1);
}
.editor .para.callout-body {
  color: var(--callout-body-text);
  font-style: italic;
  font-weight: 400;
  padding-top: 4px;
  padding-bottom: 4px;
}
.editor .para.callout-first {
  border-top-left-radius: 10px;
  border-top-right-radius: 10px;
}
.editor .para.callout-last {
  border-bottom-left-radius: 10px;
  border-bottom-right-radius: 10px;
  padding-bottom: 10px;
}
.editor .para.callout-first.callout-last {
  border-radius: 10px;
}
.editor .para:empty::before {
  content: "";
}
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 100;
  justify-content: center; align-items: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--modal-bg); border: 1px solid var(--border); border-radius: 8px;
  width: 90vw; max-width: 1100px; max-height: 85vh;
  display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: 15px; font-weight: 600; }
.modal-close {
  background: none; border: none; color: var(--text2); font-size: 20px;
  cursor: pointer; padding: 4px 8px; border-radius: 4px;
}
.modal-close:hover { background: var(--bg3); color: var(--text); }
.modal-body { flex: 1; overflow-y: auto; padding: 20px; }
.export-preview {
  background: var(--inp-bg); border: 1px solid var(--border); border-radius: 4px;
  padding: 16px; font-family: "Cascadia Code","Fira Code",Consolas,monospace;
  font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
  max-height: 400px; overflow-y: auto; color: var(--text);
}
.settings-group { margin-bottom: 16px; }
.settings-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.settings-group input, .settings-group select {
  width: 100%; padding: 8px 10px; background: var(--inp-bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: inherit;
}
.settings-group .hint { font-size: 11px; color: var(--text2); margin-top: 4px; opacity: 0.7; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--st); }
::-webkit-scrollbar-thumb { background: var(--sth); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--toast-bg); color: var(--toast-text); padding: 8px 20px; border-radius: 6px;
  font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
#toast.show { opacity: 1; }
.comment-popover {
  display: none; position: fixed; z-index: 300; width: 320px;
  background: var(--modal-bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 10px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.22); padding: 12px;
}
.comment-popover.show { display: block; }
.comment-popover-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text2); cursor: move; user-select: none; }
.comment-popover textarea {
  width: 100%; min-height: 76px; resize: vertical;
  background: var(--inp-bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 8px; font: inherit; line-height: 1.5;
}
.comment-popover-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
.comment-popover button { padding: 5px 12px; border-radius: 5px; border: 1px solid var(--btn-border); background: var(--btn-bg); color: var(--text); cursor: pointer; }
.comment-popover button.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.translate-progress {
  display: none; padding: 10px 24px; background: var(--ph-bg);
  border-top: 1px solid var(--border); font-size: 12px; color: var(--text2);
  align-items: center; gap: 8px;
}
.translate-progress.show { display: flex; }
.translate-progress .bar { flex: 1; height: 4px; background: var(--prog-bg); border-radius: 2px; overflow: hidden; }
.translate-progress .bar-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.3s; width: 0%; }
</style>
</head>
<body>
<div id="toolbar">
  <button id="btn-comment">💬 批注选中行</button>
  <button id="btn-translate" class="accent" disabled>🌐 翻译 → 中文</button>
  <span class="sep"></span>
  <button id="btn-export" class="primary" disabled>📤 导出英文/Markdown</button>
  <span class="sep"></span>
  <button id="btn-settings">⚙️</button>
  <span class="status" id="status-text">就绪</span>
  <span class="spinner" id="spinner"></span>
</div>

<div id="main">
  <div class="panel" id="panel-left">
    <div class="panel-header"><span>English</span><span class="lang-tag">原文</span></div>
    <div class="editor" id="editor-left" contenteditable="true"></div>
  </div>
  <div id="divider"></div>
  <div class="panel" id="panel-right">
    <div class="panel-header"><span>中文</span><span class="lang-tag">翻译</span></div>
    <div class="editor" id="editor-right" contenteditable="true"></div>
  </div>
</div>

<div class="translate-progress" id="translate-progress">
  <span id="translate-progress-text">翻译中...</span>
  <div class="bar"><div class="bar-fill" id="translate-bar"></div></div>
</div>

<div class="modal-overlay" id="export-modal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header"><h3>导出英文 / Markdown</h3><button class="modal-close" id="export-modal-close">&times;</button></div>
    <div class="modal-body">
      <div class="export-preview" id="export-preview"></div>
      <button id="export-copy" class="primary" style="margin-top:12px;">📋 复制到剪贴板</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal" style="max-width:500px">
    <div class="modal-header"><h3>设置</h3><button class="modal-close" id="settings-modal-close">&times;</button></div>
    <div class="modal-body">
      <div class="settings-group">
        <label>翻译服务</label>
        <select id="setting-translator">
          <option value="google">Google Translate（免费，无需 API Key）</option>
          <option value="openai">OpenAI / 兼容 API（需提供 Key）</option>
        </select>
      </div>
      <div class="settings-group" id="api-key-group" style="display:none;">
        <label>API Key</label>
        <input type="password" id="setting-api-key" placeholder="sk-...">
        <div class="hint">支持 OpenAI / DeepSeek / 其他兼容接口</div>
      </div>
      <div class="settings-group" id="api-url-group" style="display:none;">
        <label>API 地址</label>
        <input type="text" id="setting-api-url" placeholder="https://api.openai.com/v1/chat/completions">
        <div class="hint">默认 OpenAI，可改为 DeepSeek 等兼容地址</div>
      </div>
      <div class="settings-group" id="model-group" style="display:none;">
        <label>模型</label>
        <input type="text" id="setting-model" placeholder="gpt-4o-mini">
      </div>
      <button id="settings-save" class="primary" style="width:100%;margin-top:8px;">保存设置</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<div class="comment-popover" id="comment-popover">
  <div class="comment-popover-title">给选中行添加批注</div>
  <textarea id="comment-input" placeholder="例如：这里节奏需要加强"></textarea>
  <div class="comment-popover-actions">
    <button id="comment-cancel">取消</button>
    <button id="comment-confirm" class="primary">插入</button>
  </div>
</div>

<script>const editorLeft  = document.getElementById("editor-left");
const editorRight = document.getElementById("editor-right");
const statusText  = document.getElementById("status-text");
const spinner     = document.getElementById("spinner");

let commentSyncTimer = null;
let pendingCommentParas = [];
let isDraggingCommentPopover = false;
let commentPopoverDragOffset = { x: 0, y: 0 };

// ── Settings ──
const SETTINGS_KEY = "bilingual-editor-settings";
function loadSettings() { try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch { return {}; } }
function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }
let settings = loadSettings();
if (!settings.translator) settings.translator = "google";
if (!settings.apiUrl) settings.apiUrl = "https://api.openai.com/v1/chat/completions";
if (!settings.model) settings.model = "gpt-4o-mini";

function applySettingsUI() {
  document.getElementById("setting-translator").value = settings.translator;
  document.getElementById("setting-api-key").value = settings.apiKey || "";
  document.getElementById("setting-api-url").value = settings.apiUrl;
  document.getElementById("setting-model").value = settings.model;
  toggleApiFields();
}
function toggleApiFields() {
  var isAI = document.getElementById("setting-translator").value === "openai";
  document.getElementById("api-key-group").style.display = isAI ? "" : "none";
  document.getElementById("api-url-group").style.display = isAI ? "" : "none";
  document.getElementById("model-group").style.display = isAI ? "" : "none";
}

// ── Paragraph Management ──
function normalizeEditor(editor) {
  var children = Array.from(editor.childNodes);
  for (var i = 0; i < children.length; i++) {
    var child = children[i];
    if (child.nodeType === Node.TEXT_NODE) {
      if (child.textContent.trim() === "" && children.length > 1) { child.remove(); continue; }
      var div = document.createElement("div"); div.className = "para"; div.textContent = child.textContent; child.replaceWith(div);
    } else if (child.nodeType === Node.ELEMENT_NODE && child.tagName !== "DIV") {
      var div = document.createElement("div"); div.className = "para"; div.innerHTML = child.innerHTML; child.replaceWith(div);
    } else if (child.nodeType === Node.ELEMENT_NODE && child.tagName === "DIV") {
      if (!child.classList.contains("para")) child.classList.add("para");
    }
  }
  if (editor.children.length === 0) {
    var div = document.createElement("div"); div.className = "para"; div.contentEditable = "true"; editor.appendChild(div);
  }
  var paras = editor.querySelectorAll(".para");
  for (var j = 0; j < paras.length; j++) { paras[j].dataset.pid = j; paras[j].contentEditable = "true"; }
  updatePlaceholders(editor);
}

function updatePlaceholders(editor) {
  var ph = editor === editorLeft ? "直接粘贴或输入英文原文..." : "点「翻译→中文」生成，或直接粘贴中文...";
  editor.querySelectorAll(".para").forEach(function(p) { p.dataset.placeholder = ph; });
}

function getParagraphs(editor) { return Array.from(editor.querySelectorAll(".para")); }
function getParaText(para) { return para.innerText || ""; }
function setParaText(para, text) { para.innerText = text; }

function markCalloutLines(editor) {
  var paras = getParagraphs(editor);
  paras.forEach(function(para) {
    para.classList.remove("callout-line", "callout-note", "callout-body", "callout-first", "callout-last");
    var text = getParaText(para);
    var m = text.match(/^>\s*(.)/);
    if (!m) return;
    if (m[1] === "[") {
      para.classList.add("callout-line", "callout-note");
    } else {
      para.classList.add("callout-line", "callout-body");
    }
  });
  for (var i = 0; i < paras.length; i++) {
    var p = paras[i];
    if (!p.classList.contains("callout-line")) continue;
    var prev = paras[i - 1];
    var next = paras[i + 1];
    var prevCallout = prev && prev.classList.contains("callout-line");
    var nextCallout = next && next.classList.contains("callout-line");
    if (!prevCallout) p.classList.add("callout-first");
    if (!nextCallout) p.classList.add("callout-last");
  }
}

// ── Format Sync: keep paragraph count identical ──
function syncParagraphCount() {
  var lp = getParagraphs(editorLeft);
  var rp = getParagraphs(editorRight);
  var max = Math.max(lp.length, rp.length);
  while (getParagraphs(editorLeft).length < max) {
    var d = document.createElement("div"); d.className = "para"; d.contentEditable = "true"; editorLeft.appendChild(d);
  }
  while (getParagraphs(editorRight).length < max) {
    var d = document.createElement("div"); d.className = "para"; d.contentEditable = "true"; editorRight.appendChild(d);
  }
  normalizeEditor(editorLeft);
  normalizeEditor(editorRight);
  markCalloutLines(editorLeft);
  markCalloutLines(editorRight);
}

// ── Highlight ──
function clearHighlight() {
  document.querySelectorAll(".editor .para.highlight").forEach(function(p) { p.classList.remove("highlight"); });
}
function highlightBoth(pid) {
  clearHighlight();
  var l = editorLeft.querySelector('.para[data-pid="' + pid + '"]');
  var r = editorRight.querySelector('.para[data-pid="' + pid + '"]');
  if (l) l.classList.add("highlight");
  if (r) r.classList.add("highlight");
}
function onParaClick(e) {
  var para = e.target.closest(".para"); if (!para) return;
  var pid = parseInt(para.dataset.pid); if (isNaN(pid)) return;
  highlightBoth(pid);
  var isLeft = para.closest("#editor-left");
  var other = isLeft ? editorRight : editorLeft;
  var op = other.querySelector('.para[data-pid="' + pid + '"]');
  if (op) op.scrollIntoView({ behavior: "smooth", block: "center" });
}

function getParagraphFromNode(node) {
  if (!node) return null;
  if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
  return node && node.closest ? node.closest(".para") : null;
}

function getSelectedParagraphs() {
  var selection = window.getSelection();
  if (!selection || selection.rangeCount === 0) return [];
  var range = selection.getRangeAt(0);
  var startPara = getParagraphFromNode(range.startContainer);
  var endPara = getParagraphFromNode(range.endContainer);
  if (!startPara || !endPara) return [];
  var editor = startPara.closest(".editor");
  if (!editor || editor !== endPara.closest(".editor")) return [];
  var paras = getParagraphs(editor);
  var startIndex = paras.indexOf(startPara);
  var endIndex = paras.indexOf(endPara);
  if (startIndex < 0 || endIndex < 0) return [];
  if (startIndex > endIndex) { var temp = startIndex; startIndex = endIndex; endIndex = temp; }
  return paras.slice(startIndex, endIndex + 1);
}

function getActiveEditor() {
  var selection = window.getSelection();
  if (selection && selection.rangeCount > 0) {
    var para = getParagraphFromNode(selection.getRangeAt(0).startContainer);
    if (para) return para.closest(".editor");
  }
  var highlighted = document.querySelector(".para.highlight");
  return highlighted ? highlighted.closest(".editor") : editorLeft;
}

function applyCalloutToParagraphs(selectedParas, comment) {
  if (!comment || !comment.trim()) return;
  if (!selectedParas || selectedParas.length === 0) { showToast("请先选中要批注的行"); return; }
  var editor = selectedParas[0].closest(".editor");
  var otherEditor = editor === editorLeft ? editorRight : editorLeft;
  var selectedText = selectedParas.map(function(para) { return getParaText(para); });
  
  // 记录选中段落在编辑器中的起始索引
  var allParas = getParagraphs(editor);
  var startIndex = allParas.indexOf(selectedParas[0]);
  
  // 在当前侧：把第一行改成批注标题，然后在后面插入被批注的行
  selectedParas[0].innerText = "> [!note] " + comment.trim();
  for (var i = 1; i < selectedParas.length; i++) {
    selectedParas[i].remove();
  }
  var insertAfter = selectedParas[0];
  for (var j = 0; j < selectedText.length; j++) {
    var linePara = document.createElement("div");
    linePara.className = "para";
    linePara.contentEditable = "true";
    linePara.innerText = "> " + selectedText[j];
    insertAfter.after(linePara);
    insertAfter = linePara;
  }
  
  // 在另一侧同样位置插入批注标题，保持行对应关系一致
  var otherParas = getParagraphs(otherEditor);
  if (startIndex < otherParas.length) {
    var otherStart = otherParas[startIndex];
    var commentTitle = document.createElement("div");
    commentTitle.className = "para";
    commentTitle.contentEditable = "true";
    commentTitle.innerText = "> [!note] " + comment.trim();
    otherStart.before(commentTitle);
  }
  
  normalizeEditor(editor);
  normalizeEditor(otherEditor);
  markCalloutLines(editor);
  markCalloutLines(otherEditor);
  syncParagraphCount();
  updateStatus();
  showToast("已插入编辑批注范围");
}

function showCommentPopover(x, y) {
  var popover = document.getElementById("comment-popover");
  var input = document.getElementById("comment-input");
  input.value = "";
  popover.classList.add("show");
  var maxLeft = window.innerWidth - 340;
  var maxTop = window.innerHeight - 180;
  popover.style.left = Math.max(12, Math.min(x + 10, maxLeft)) + "px";
  popover.style.top = Math.max(12, Math.min(y + 8, maxTop)) + "px";
  setTimeout(function() { input.focus(); }, 0);
}

function hideCommentPopover() {
  document.getElementById("comment-popover").classList.remove("show");
  pendingCommentParas = [];
}

function confirmCommentPopover() {
  var input = document.getElementById("comment-input");
  applyCalloutToParagraphs(pendingCommentParas, input.value);
  hideCommentPopover();
}

function setupCommentPopoverDrag() {
  var popover = document.getElementById("comment-popover");
  var title = popover.querySelector(".comment-popover-title");
  title.addEventListener("mousedown", function(e) {
    isDraggingCommentPopover = true;
    var rect = popover.getBoundingClientRect();
    commentPopoverDragOffset.x = e.clientX - rect.left;
    commentPopoverDragOffset.y = e.clientY - rect.top;
    e.preventDefault();
  });
  document.addEventListener("mousemove", function(e) {
    if (!isDraggingCommentPopover) return;
    var maxLeft = window.innerWidth - popover.offsetWidth - 8;
    var maxTop = window.innerHeight - popover.offsetHeight - 8;
    popover.style.left = Math.max(8, Math.min(e.clientX - commentPopoverDragOffset.x, maxLeft)) + "px";
    popover.style.top = Math.max(8, Math.min(e.clientY - commentPopoverDragOffset.y, maxTop)) + "px";
  });
  document.addEventListener("mouseup", function() {
    isDraggingCommentPopover = false;
  });
}

function wrapSelectedLinesAsCallout(x, y) {
  var selectedParas = getSelectedParagraphs();
  if (selectedParas.length === 0) {
    var editor = getActiveEditor();
    var activePara = editor.querySelector(".para.highlight") || editor.querySelector(".para");
    if (activePara) selectedParas = [activePara];
  }
  if (selectedParas.length === 0) { showToast("请先选中要批注的行"); return; }
  pendingCommentParas = selectedParas;
  showCommentPopover(x || Math.round(window.innerWidth / 2 - 160), y || 80);
}

function onEditorInput() {
  clearTimeout(commentSyncTimer);
  commentSyncTimer = setTimeout(function() {
    syncParagraphCount();
    markCalloutLines(editorLeft);
    markCalloutLines(editorRight);
    updateStatus();
  }, 400);
}

// ── Translation ──
async function translateWithGoogle(text) {
  var url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=" + encodeURIComponent(text);
  var resp = await fetch(url);
  var data = await resp.json();
  if (data && data[0]) return data[0].map(function(p) { return p[0]; }).join("");
  throw new Error("Google Translate 返回异常");
}

async function translateWithOpenAI(text) {
  if (!settings.apiKey) throw new Error("请先在设置中填写 API Key");
  var resp = await fetch(settings.apiUrl, {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + settings.apiKey },
    body: JSON.stringify({
      model: settings.model,
      messages: [
        { role: "system", content: "你是专业翻译。将英文翻译成中文。准确、自然、不过度翻译，保持原文风格。只返回翻译，不要解释。" },
        { role: "user", content: text }
      ],
      temperature: 0.3
    })
  });
  if (!resp.ok) { var err = await resp.text(); throw new Error("API 错误 (" + resp.status + "): " + err); }
  var data = await resp.json();
  return data.choices[0].message.content.trim();
}

async function translateText(text) {
  return settings.translator === "openai" ? translateWithOpenAI(text) : translateWithGoogle(text);
}

async function doTranslate() {
  var lp = getParagraphs(editorLeft);
  var nonEmpty = lp.filter(function(p) { return getParaText(p).trim() !== ""; });
  if (nonEmpty.length === 0) { showToast("请先在左侧粘贴英文原文"); return; }

  var btn = document.getElementById("btn-translate");
  var prog = document.getElementById("translate-progress");
  var progText = document.getElementById("translate-progress-text");
  var progBar = document.getElementById("translate-bar");

  btn.disabled = true; spinner.classList.add("show"); prog.classList.add("show"); progBar.style.width = "0%";

  editorRight.innerHTML = "";
  lp.forEach(function() {
    var d = document.createElement("div"); d.className = "para"; d.contentEditable = "true"; editorRight.appendChild(d);
  });
  normalizeEditor(editorRight); updatePlaceholders(editorRight);
  markCalloutLines(editorRight);

  var done = 0; var total = nonEmpty.length;
  for (var k = 0; k < nonEmpty.length; k++) {
    var para = nonEmpty[k];
    var text = getParaText(para).trim();
    if (!text) { done++; continue; }
    progText.textContent = "翻译中... (" + (done + 1) + "/" + total + ")";
    progBar.style.width = ((done / total) * 100) + "%";
    try {
      var result = await translateText(text);
      var pid = para.dataset.pid;
      var rp = editorRight.querySelector('.para[data-pid="' + pid + '"]');
      if (rp) setParaText(rp, result);
    } catch (err) {
      var pid = para.dataset.pid;
      var rp = editorRight.querySelector('.para[data-pid="' + pid + '"]');
      if (rp) setParaText(rp, "[翻译失败] " + err.message);
    }
    done++;
    progBar.style.width = ((done / total) * 100) + "%";
  }

  progText.textContent = "翻译完成 (" + total + " 段)";
  setTimeout(function() { prog.classList.remove("show"); spinner.classList.remove("show"); btn.disabled = false; }, 1500);
  normalizeEditor(editorRight); updateStatus();
  showToast("翻译完成！");
}

// ── Load Text ──
function loadTextIntoEditor(editor, text) {
  editor.innerHTML = "";
  var paragraphs = text.split(/\n/);
  if (paragraphs.length === 0) {
    var d = document.createElement("div"); d.className = "para"; d.contentEditable = "true"; editor.appendChild(d);
  } else {
    paragraphs.forEach(function(p) {
      var d = document.createElement("div"); d.className = "para"; d.contentEditable = "true"; d.innerText = p; editor.appendChild(d);
    });
  }
  normalizeEditor(editor); updatePlaceholders(editor); markCalloutLines(editor);
}

function handlePlainTextPaste(editor, e) {
  var text = (e.clipboardData || window.clipboardData).getData("text");
  if (!text || text.indexOf("\n") === -1) return;
  e.preventDefault();
  loadTextIntoEditor(editor, text);
  syncParagraphCount();
  markCalloutLines(editorLeft);
  markCalloutLines(editorRight);
  updateStatus();
}

// ── Export ──
function exportEnglishWithComments() {
  return getParagraphs(editorLeft).map(function(p) { return getParaText(p); }).filter(function(t) { return t.trim(); }).join("\n\n");
}

// ── Status ──
function updateStatus() {
  var lc = getParagraphs(editorLeft).length, rc = getParagraphs(editorRight).length;
  statusText.textContent = lc + " / " + rc + " 段";
  var has = getParagraphs(editorLeft).some(function(p) { return getParaText(p).trim(); });
  document.getElementById("btn-translate").disabled = !has;
  document.getElementById("btn-export").disabled = !has;
}

// ── Toast ──
function showToast(msg) {
  var t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 2000);
}

// ── Divider ──
function setupDivider() {
  var divider = document.getElementById("divider");
  var left = document.getElementById("panel-left"), right = document.getElementById("panel-right");
  var dragging = false;
  divider.addEventListener("mousedown", function() {
    dragging = true; divider.classList.add("dragging");
    document.body.style.cursor = "col-resize"; document.body.style.userSelect = "none";
  });
  document.addEventListener("mousemove", function(e) {
    if (!dragging) return;
    var rect = document.getElementById("main").getBoundingClientRect();
    var pct = ((e.clientX - rect.left) / rect.width) * 100;
    if (pct < 20 || pct > 80) return;
    left.style.flex = "0 0 " + pct + "%";
    right.style.flex = "0 0 " + (100 - pct) + "%";
  });
  document.addEventListener("mouseup", function() {
    if (!dragging) return;
    dragging = false; divider.classList.remove("dragging");
    document.body.style.cursor = ""; document.body.style.userSelect = "";
  });
}

// ── Mutation Observer ──
function setupMutationObserver(editor) {
  var obs = new MutationObserver(function(mutations) {
    var needs = false;
    for (var i = 0; i < mutations.length; i++) {
      var m = mutations[i];
      if (m.type === "childList") {
        for (var j = 0; j < m.addedNodes.length; j++) {
          var n = m.addedNodes[j];
          if (n.nodeType === Node.ELEMENT_NODE && (n.tagName === "DIV" || n.tagName === "BR" || n.tagName === "P")) { needs = true; break; }
        }
      }
      if (needs) break;
    }
    if (needs) { syncParagraphCount(); updateStatus(); }
  });
  obs.observe(editor, { childList: true, subtree: true });
  return obs;
}

// ── Init ──
function init() {
  normalizeEditor(editorLeft); normalizeEditor(editorRight);
  updatePlaceholders(editorLeft); updatePlaceholders(editorRight);

  editorLeft.addEventListener("mousedown", onParaClick);
  editorRight.addEventListener("mousedown", onParaClick);
  editorLeft.addEventListener("contextmenu", function(e) { if (e.target.closest(".para")) { e.preventDefault(); onParaClick(e); wrapSelectedLinesAsCallout(e.clientX, e.clientY); } });
  editorRight.addEventListener("contextmenu", function(e) { if (e.target.closest(".para")) { e.preventDefault(); onParaClick(e); wrapSelectedLinesAsCallout(e.clientX, e.clientY); } });
  editorLeft.addEventListener("input", onEditorInput);
  editorRight.addEventListener("input", onEditorInput);
  editorLeft.addEventListener("paste", function(e) { handlePlainTextPaste(editorLeft, e); });
  editorRight.addEventListener("paste", function(e) { handlePlainTextPaste(editorRight, e); });
  setupMutationObserver(editorLeft);
  setupMutationObserver(editorRight);

  document.getElementById("btn-comment").addEventListener("click", wrapSelectedLinesAsCallout);
  document.getElementById("comment-cancel").addEventListener("click", hideCommentPopover);
  document.getElementById("comment-confirm").addEventListener("click", confirmCommentPopover);
  document.getElementById("comment-input").addEventListener("keydown", function(e) {
    if (e.key === "Escape") hideCommentPopover();
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      confirmCommentPopover();
    }
  });
  setupCommentPopoverDrag();

  document.getElementById("btn-translate").addEventListener("click", doTranslate);

  document.getElementById("btn-export").addEventListener("click", function() {
    document.getElementById("export-preview").textContent = exportEnglishWithComments();
    document.getElementById("export-modal").classList.add("show");
  });
  document.getElementById("export-modal-close").addEventListener("click", function() {
    document.getElementById("export-modal").classList.remove("show");
  });
  document.getElementById("export-copy").addEventListener("click", function() {
    navigator.clipboard.writeText(document.getElementById("export-preview").textContent).then(function() { showToast("已复制到剪贴板！"); });
  });

  document.getElementById("btn-settings").addEventListener("click", function() {
    applySettingsUI(); document.getElementById("settings-modal").classList.add("show");
  });
  document.getElementById("settings-modal-close").addEventListener("click", function() {
    document.getElementById("settings-modal").classList.remove("show");
  });
  document.getElementById("setting-translator").addEventListener("change", toggleApiFields);
  document.getElementById("settings-save").addEventListener("click", function() {
    settings.translator = document.getElementById("setting-translator").value;
    settings.apiKey = document.getElementById("setting-api-key").value;
    settings.apiUrl = document.getElementById("setting-api-url").value;
    settings.model = document.getElementById("setting-model").value;
    saveSettings(settings); document.getElementById("settings-modal").classList.remove("show");
    showToast("设置已保存");
  });

  document.querySelectorAll(".modal-overlay").forEach(function(o) {
    o.addEventListener("click", function(e) { if (e.target === o) o.classList.remove("show"); });
  });
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") document.querySelectorAll(".modal-overlay.show").forEach(function(o) { o.classList.remove("show"); });
  });
  document.addEventListener("mousedown", function(e) {
    var popover = document.getElementById("comment-popover");
    if (!popover.classList.contains("show")) return;
    if (popover.contains(e.target)) return;
    if (e.target.closest("#btn-comment")) return;
    hideCommentPopover();
  });

  setupDivider();
  updateStatus();
}

init();
</script>
</body>
